<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Blog Tech</title>
    <style>
        body {
            font-family: 'Times New Roman', Times, serif; /* Fonte serifada como na imagem */
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f4f4f4;
        }

        /* Estilo do cabeçalho azul */
        header {
            background-color: #1a3a63; /* Azul escuro */
            color: white;
            width: 100%;
            max-width: 800px;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        header h1 {
            margin: 0;
            font-size: 48px;
            font-weight: bold;
        }

        header p {
            margin-top: 20px;
            font-size: 18px;
        }

        /* Estilo do conteúdo do post */
        main {
            background-color: white;
            width: 100%;
            max-width: 800px;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        h2 {
            color: #1a3a63;
            font-size: 32px;
            margin-top: 0;
        }

        .author {
            color: #333;
            font-size: 18px;
            margin-bottom: 30px;
        }

        /* Nova regra para a imagem ser responsiva */
        .post-img {
            width: 100%;
            max-width: 100%;
            height: auto;
            margin-bottom: 20px;
            display: block;
        }

        .content {
            color: #333;
            font-size: 20px;
            line-height: 1.4;
        }
    </style>
</head>
